services:
  vitalstream.aggregator:
    image: vitalstream.aggregator
    build:
      context: .
      dockerfile: src/VitalStream.Aggregator/Dockerfile
    environment:
      - Kafka__BootstrapServers=broker:29092
      - Kafka__Topic=vital-readings
      - Database__ConnectionString=Host=timescaledb;Port=5432;Database=vitalstream;Username=postgres;Password=postgres
      - Redis__ConnectionString=redis:6379
    depends_on:
      - broker
      - timescaledb
      - redis

  vitalstream.alerts:
    image: vitalstream.alerts
    build:
      context: .
      dockerfile: src/VitalStream.Alerts/Dockerfile
    environment:
      - Redis__ConnectionString=redis:6379
    depends_on:
      - redis

  vitalstream.ingest:
    image: vitalstream.ingest
    build:
      context: .
      dockerfile: src/VitalStream.Ingest/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - Kafka__BootstrapServers=broker:29092
    depends_on:
      - broker

  vitalstream.query:
    image: vitalstream.query
    build:
      context: .
      dockerfile: src/VitalStream.Query/Dockerfile
    ports:
      - "8081:8080"
    environment:
      - Redis__ConnectionString=redis:6379
    depends_on:
      - redis

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vitalstream
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - 6379:6379

  broker:
    image: apache/kafka:latest
    container_name: broker
    ports:
      - 9092:9092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://broker:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 12

volumes:
  timescaledb_data:
