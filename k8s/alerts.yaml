apiVersion: apps/v1
kind: Deployment
metadata:
  name: vitalstream-alerts
  namespace: vitalstream
  labels:
    app: vitalstream-alerts
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vitalstream-alerts
  template:
    metadata:
      labels:
        app: vitalstream-alerts
    spec:
      containers:
        - name: alerts
          image: vitalstream.alerts:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: clinical-thresholds
          env:
            - name: ASPNETCORE_HTTP_PORTS
              value: "8080"
            - name: Redis__ConnectionString
              value: "redis:6379"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: vitalstream-alerts
  namespace: vitalstream
spec:
  selector:
    app: vitalstream-alerts
  ports:
    - port: 80
      targetPort: 8080